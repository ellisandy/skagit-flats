# skagit-flats sample destinations configuration
# Copy to destinations.toml and edit for your trips.
# This file is written by the web UI (POST /destinations) and also by hand.
#
# SIGNAL RELEVANCE
# Each destination declares which data signals matter for it via [destinations.signals].
# Only relevant signals appear in the planning view and are checked during go/no-go
# evaluation. This prevents unrelated data (e.g. river flooding for an island trip,
# ferry schedules for a mountain hike) from cluttering the display.
#
# Available signals: weather, river, ferry, trail, road
# weather — temperature, precipitation, wind (almost always relevant)
# river   — USGS gauge level and streamflow (lowland/valley destinations)
# ferry   — WSDOT vessel status and departure times (island destinations)
# trail   — trail and campsite conditions (hiking/camping destinations)
# road    — road closure and restriction status (mountain/seasonal roads)
#
# All signals default to true if [destinations.signals] is omitted, so existing
# configurations continue to work without changes.

# Lowland bike loop in the Skagit River floodplain.
# Flooding and road access matter; ferry and trail do not.
[[destinations]]
name = "Skagit Flats Loop"

[destinations.signals]
weather = true
river = true
ferry = false
trail = false
road = true

[destinations.criteria]
min_temp_f = 45.0
max_temp_f = 85.0
max_precip_chance_pct = 40.0
max_river_level_ft = 12.0
max_river_flow_cfs = 15000.0
road_open_required = true

# Mountain reservoir campsite; SR-20 is seasonal and may be closed.
# Road access and trail conditions matter; river gauge and ferry do not.
[[destinations]]
name = "Baker Lake"

[destinations.signals]
weather = true
river = false
ferry = false
trail = true
road = true

[destinations.criteria]
min_temp_f = 40.0
road_open_required = true

# Island destination requiring ferry crossing.
# Ferry schedule matters; river flooding and mountain roads do not.
[[destinations]]
name = "Guemes Island"

[destinations.signals]
weather = true
river = false
ferry = true
trail = false
road = false

[destinations.criteria]
max_precip_chance_pct = 60.0
