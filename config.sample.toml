# skagit-flats sample configuration.
# Copy to config.toml and edit for your setup.

[device]
# URL of the pre-rendered display image. The endpoint must return image/png.
image_url = "http://127.0.0.1:9090/image.png"
# How often to fetch and refresh the display, in seconds.
refresh_interval_secs = 60

[display]
# Must match the connected panel. Waveshare 7.5" v2 = 800x480.
width = 800
height = 480
